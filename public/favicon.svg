<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="paper" x1="180" y1="110" x2="340" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="backSheet" x1="120" y1="120" x2="280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#64748B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="clipOuter" x1="320" y1="100" x2="430" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="clipInner" x1="345" y1="120" x2="405" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="shadow" x="80" y="70" width="360" height="360" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- transparent background for favicon compatibility -->

  <g filter="url(#shadow)">
    <!-- back note -->
    <rect x="116" y="154" width="208" height="242" rx="24"
          transform="rotate(-10 116 154)" fill="url(#backSheet)" stroke="#0F172A" stroke-width="8"/>

    <!-- main note -->
    <rect x="144" y="92" width="240" height="280" rx="28"
          fill="url(#paper)" stroke="#0F172A" stroke-width="10"/>

    <!-- top rings -->
    <g>
      <rect x="186" y="70" width="28" height="52" rx="14" fill="#0F172A"/>
      <rect x="242" y="70" width="28" height="52" rx="14" fill="#0F172A"/>
      <rect x="298" y="70" width="28" height="52" rx="14" fill="#0F172A"/>

      <rect x="193" y="74" width="14" height="28" rx="7" fill="#64748B"/>
      <rect x="249" y="74" width="14" height="28" rx="7" fill="#64748B"/>
      <rect x="305" y="74" width="14" height="28" rx="7" fill="#64748B"/>
    </g>

    <!-- paper lines -->
    <rect x="192" y="166" width="132" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="192" y="218" width="132" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="192" y="270" width="132" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="192" y="322" width="132" height="10" rx="5" fill="#CBD5E1"/>

    <!-- paperclip -->
    <g transform="rotate(24 360 182)">
      <rect x="326" y="90" width="90" height="190" rx="45"
            fill="none" stroke="#0F172A" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="326" y="90" width="90" height="190" rx="45"
            fill="none" stroke="url(#clipOuter)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="349" y="118" width="44" height="130" rx="22"
            fill="none" stroke="#0F172A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="349" y="118" width="44" height="130" rx="22"
            fill="none" stroke="url(#clipInner)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
